worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── 로그 (instance_id 추적용) ───────────────────────────
    log_format upstream_log '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            'upstream=$upstream_addr rt=$request_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log upstream_log;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── 업스트림 (App×2, 라운드로빈) ───────────────────────
    upstream payments_apps {
        server app1:8080 max_fails=2 fail_timeout=10s;
        server app2:8080 max_fails=2 fail_timeout=10s;
        keepalive 64;
    }

    server {
        listen 80 default_server;
        server_name _;

        # Nginx 자체 헬스 (외부 LB가 nginx를 monitor할 때)
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "OK\n";
        }

        # 모든 트래픽을 App으로 프록시
        location / {
            proxy_pass http://payments_apps;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # ── 자동 페일오버 ────────────────────────────
            # 한 노드가 5xx/timeout 응답하면 즉시 다른 노드로 재시도
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 5s;

            # ── 타임아웃 ─────────────────────────────────
            proxy_connect_timeout 3s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # 클라이언트 → Nginx 버퍼링
            client_max_body_size 1m;
            client_body_buffer_size 16k;
        }
    }
}
